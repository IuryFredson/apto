services:
  postgres:
    image: postgres:16
    container_name: apto-postgres
    restart: always
    environment:
      POSTGRES_DB: apto
      POSTGRES_USER: apto
      POSTGRES_PASSWORD: apto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
